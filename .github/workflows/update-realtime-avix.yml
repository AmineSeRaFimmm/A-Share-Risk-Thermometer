name: Update Realtime AVIX

on:
  schedule:
    - cron: "30-55/5 1 * * 1-5"
    - cron: "*/5 2 * * 1-5"
    - cron: "0-30/5 3 * * 1-5"
    - cron: "*/5 5-6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: realtime-avix
  cancel-in-progress: true

jobs:
  update-realtime-avix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update realtime AVIX
        run: python scripts/update_realtime_avix.py

      - name: Validate realtime AVIX
        run: python scripts/validate_realtime_avix.py

      - name: Commit realtime AVIX data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/option_realtime data/normalized/realtime_option_chain.csv data/calculated/avix_realtime_mid.csv data/site docs/data docs/assets/app.js
          git diff --cached --quiet || git commit -m "Update realtime AVIX"
          git push
