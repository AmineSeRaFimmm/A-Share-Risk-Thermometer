name: Update Realtime AVIX

on:
  schedule:
    - cron: "25 1 * * 1-5"
    - cron: "55 4 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "single runs once; session loops until the current A-share session ends"
        required: false
        default: "single"
        type: choice
        options:
          - single
          - session

permissions:
  contents: write
  actions: write

concurrency:
  group: realtime-avix
  cancel-in-progress: true

jobs:
  update-realtime-avix:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: "1"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update realtime AVIX session
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.mode }}" != "session" ]]; then
            max_iterations=1
            session_end_epoch=0
          else
            max_iterations=40
            current_utc_hour="$(date -u +%H)"
            current_utc_minute="$(date -u +%M)"
            current_utc_total=$((10#$current_utc_hour * 60 + 10#$current_utc_minute))
            if (( current_utc_total < 240 )); then
              session_end_utc="03:35"
            else
              session_end_utc="07:05"
            fi
            session_end_epoch="$(date -u -d "$(date -u +%F) ${session_end_utc}:00" +%s)"
          fi

          iteration=0
          successful_updates=0
          while (( iteration < max_iterations )); do
            now_epoch="$(date -u +%s)"
            if (( session_end_epoch > 0 && now_epoch > session_end_epoch )); then
              echo "A-share realtime session ended."
              break
            fi

            iteration=$((iteration + 1))
            echo "Realtime AVIX iteration ${iteration} started at $(date -u --iso-8601=seconds)"
            git pull --rebase origin main

            if timeout 240s python scripts/update_realtime_avix.py; then
              python scripts/validate_realtime_avix.py
              python scripts/stage_realtime_outputs.py
              if git diff --cached --quiet; then
                echo "No realtime AVIX changes to commit."
              else
                git commit -m "Update realtime AVIX"
                git pull --rebase --autostash origin main
                git push
                # Trigger Pages rebuild so live site sees nowcast sooner than next daily deploy.
                gh workflow run deploy-pages.yml --ref main \
                  || echo "::warning::Could not trigger deploy-pages workflow"
              fi
              successful_updates=$((successful_updates + 1))
            else
              echo "::warning::Realtime AVIX update timed out or failed; next loop will retry."
            fi

            if (( max_iterations == 1 )); then
              break
            fi
            sleep 300
          done

          if (( successful_updates == 0 )); then
            echo "::error::Realtime AVIX did not complete successfully in this run."
            exit 1
          fi
