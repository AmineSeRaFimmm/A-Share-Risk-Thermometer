name: Update Realtime AVIX

on:
  schedule:
    - cron: "45 1 * * 1-5"
    - cron: "35 3 * * 1-5"
    - cron: "55 6 * * 1-5"
    - cron: "15 7 * * 1-5"
    - cron: "10 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-realtime-avix:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update realtime AVIX
        run: python scripts/update_realtime_avix.py

      - name: Validate realtime AVIX
        run: python scripts/validate_realtime_avix.py

      - name: Commit realtime AVIX data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/option_realtime data/normalized/realtime_option_chain.csv data/calculated/avix_realtime_mid.csv data/site docs/data
          git diff --cached --quiet || git commit -m "Update realtime AVIX"
          git push
